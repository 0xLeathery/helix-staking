name: Security & Code Quality Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/security-checks.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'programs'

      - name: Run Clippy
        run: cargo clippy --package helix-staking -- -D warnings
        continue-on-error: false

      - name: Clippy Success
        if: success()
        run: echo "✅ Clippy checks passed!"

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'programs'

      - name: Install Cargo Audit
        run: cargo install cargo-audit

      - name: Run Cargo Audit
        run: cargo audit --deny unmaintained
        continue-on-error: false

      - name: Audit Success
        if: success()
        run: echo "✅ Security audit passed!"

  summary:
    name: Security Check Summary
    needs: [clippy, audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "::group::Security Check Results"
          echo "Clippy: ${{ needs.clippy.result }}"
          echo "Audit:  ${{ needs.audit.result }}"
          echo "::endgroup::"

      - name: Fail if any check failed
        if: |
          needs.clippy.result == 'failure' ||
          needs.audit.result == 'failure'
        run: exit 1

      - name: All Checks Passed
        if: success()
        run: echo "✅ All security checks passed!"
